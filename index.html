cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema del Streaming en Argentina — Tesis UNCUYO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        header {
            border-bottom: 2px solid #dee2e6;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #1a252f;
        }
        p.subtitle {
            color: #6c757d;
            margin: 0;
            font-size: 15px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #f1f3f5;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
        }
        .card h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #495057;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card .value {
            font-size: 28px;
            font-weight: bold;
            color: #0d6efd;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 400px;
            width: 100%;
        }
        #error-message {
            color: #dc3545;
            background-color: #f8d7da;
            padding: 15px;
            border-radius: 4px;
            display: none;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cartografía del Streaming en Argentina</h1>
        <p class="subtitle">Monitoreo automático de métricas y concentración de plataformas — Tesis Doctoral (Ciencias Sociales - UNCUYO)</p>
    </header>

    <div id="error-message"></div>

    <div class="metrics-grid">
        <div class="card">
            <h3>Canales Monitoreados</h3>
            <div id="metric-canales" class="value">...</div>
        </div>
        <div class="card">
            <h3>Última Actualización</h3>
            <div id="metric-fecha" class="value" style="font-size: 16px; padding-top: 10px;">...</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="graficoEcosistema"></canvas>
    </div>
</div>

<script>
    async function inicializarDashboard() {
        const errorDiv = document.getElementById('error-message');
        try {
            // Buscamos el JSON generado por tu extractor en la carpeta public
            const response = await fetch('./data/ecosistema.json');
            if (!response.ok) {
                throw new Error(`No se pudo cargar el archivo de datos (Status: ${response.status})`);
            }
            
            const datos = await response.json();
            
            if (!datos || datos.length === 0) {
                throw new Error("El archivo de datos está vacío.");
            }

            // 1. Actualizar Tarjetas de Métricas
            document.getElementById('metric-canales').textContent = datos.length;
            
            // Tomamos la fecha del primer registro como referencia de actualización
            if (datos[0].snapshot_date || datos[0].fecha) {
                const fechaRaw = datos[0].snapshot_date || datos[0].fecha;
                document.getElementById('metric-fecha').textContent = fechaRaw;
            } else {
                document.getElementById('metric-fecha').textContent = new Date().toLocaleDateString();
            }

            // 2. Procesar datos para el gráfico de ejemplo (Canales con más métricas o vistas)
            // Ordenamos por alguna métrica representativa o mapeamos los nombres
            const labels = datos.map(item => item.channel_title || item.titulo || 'Canal');
            const visualizaciones = datos.map(item => parseInt(item.view_count || item.vistas || 0));

            // Acotamos a los 15 principales para que el gráfico sea legible
            const topLabels = labels.slice(0, 15);
            const topData = visualizaciones.slice(0, 15);

            // 3. Renderizar Gráfico con Chart.js
            const ctx = document.getElementById('graficoEcosistema').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: topLabels,
                    datasets: [{
                        label: 'Volumen de Visualizaciones Acumuladas',
                        data: topData,
                        backgroundColor: 'rgba(13, 110, 253, 0.2)',
                        borderColor: 'rgba(13, 110, 253, 1)',
                        borderWidth: 1.5,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

        } catch (error) {
            console.error(error);
            errorDiv.style.display = 'block';
            errorDiv.textContent = `Error al renderizar el dashboard: ${error.message}. Asegurate de que el archivo 'public/data/ecosistema.json' exista y tenga el formato correcto.`;
        }
    }

    document.addEventListener('DOMContentLoaded', inicializarDashboard);
</script>

</body>
</html>
EOF
